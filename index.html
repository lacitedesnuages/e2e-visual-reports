<!doctype html><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Régression visuelle — La Cité des Nuages</title>
<style>
  :root{color-scheme:light dark;--fg:#1a1a1a;--dim:#666;--bd:#e2e2e2;--bg:#fff;--link:#0c447c}
  @media (prefers-color-scheme:dark){:root{--fg:#e6e6e6;--dim:#9a9a9a;--bd:#333;--bg:#0f0f10;--link:#7ab6ff}}
  *{box-sizing:border-box}
  body{font-family:system-ui,sans-serif;max-width:720px;margin:3rem auto;padding:0 1rem;color:var(--fg);background:var(--bg)}
  h1{font-size:22px}
  h2{font-size:16px;margin:1.5rem 0 .5rem;color:var(--fg)}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.75rem}
  .card{border:1px solid var(--bd);border-radius:8px;padding:.75rem 1rem}
  .card a{color:var(--link);text-decoration:none;font-weight:500;display:block}
  .card a:hover{text-decoration:underline}
  .dim{color:var(--dim);font-size:12px;margin-top:2px}
</style>
